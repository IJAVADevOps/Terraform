---
# Téléchargement sécurisé (TLS + checksum) et extraction idempotente.

- name: Créer le répertoire d'extraction temporaire
  ansible.builtin.file:
    path: "{{ ibm_mq_extract_dir }}"
    state: directory
    owner: root
    group: mqm
    mode: "0750"
  become: true
  when: not ibm_mq_installed

- name: Télécharger l'archive IBM MQ (TLS + vérification checksum)
  ansible.builtin.get_url:
    url: "{{ ibm_mq_nexus_base_url }}/{{ ibm_mq_archive_name }}"
    dest: "{{ ibm_mq_extract_dir }}/{{ ibm_mq_archive_name }}"
    checksum: "sha256:{{ ibm_mq_archive_sha256 }}"
    validate_certs: true
    mode: "0640"
    owner: root
    group: mqm
    timeout: "{{ ibm_mq_download_timeout }}"
  become: true
  when: not ibm_mq_installed

- name: Extraire l'archive IBM MQ
  ansible.builtin.unarchive:
    src: "{{ ibm_mq_extract_dir }}/{{ ibm_mq_archive_name }}"
    dest: "{{ ibm_mq_extract_dir }}"
    remote_src: true
    creates: "{{ ibm_mq_extract_dir }}/{{ ibm_mq_server_subdir }}/{{ ibm_mq_license_script }}"
  become: true
  when: not ibm_mq_installed
